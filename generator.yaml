ignore:
  resource_names:
    - CliToken
    - WebLoginToken
operations:
  GetEnvironment:
    output_wrapper_field_path: Environment
resources:
  Environment:
    ignore_idempotency_token: true
    exceptions:
      errors:
        404:
          code: ResourceNotFoundException
      terminal_codes:
        - ValidationException
    fields:
      Name:
        is_primary_key: true
        is_immutable: true
      Status:
        is_read_only: true
        from:
          operation: GetEnvironment
          path: Environment.Status
      WebserverUrl:
        is_read_only: true
        from:
          operation: GetEnvironment
          path: Environment.WebserverUrl
      CreatedAt:
        is_read_only: true
        from:
          operation: GetEnvironment
          path: Environment.CreatedAt
      LastUpdate:
        is_read_only: true
        from:
          operation: GetEnvironment
          path: Environment.LastUpdate
      ExecutionRoleARN:
        references:
          resource: Role
          service_name: iam
          path: Status.ACKResourceMetadata.ARN
      SourceBucketARN:
        references:
          resource: Bucket
          service_name: s3
          path: Status.ACKResourceMetadata.ARN
      KmsKey:
        is_immutable: true
        references:
          resource: Key
          service_name: kms
          path: Status.ACKResourceMetadata.ARN
      NetworkConfiguration.SecurityGroupIds:
        references:
          resource: SecurityGroup
          service_name: ec2
          path: Status.ID
      NetworkConfiguration.SubnetIds:
        is_immutable: true
        references:
          resource: Subnet
          service_name: ec2
          path: Status.SubnetID
      EndpointManagement:
        is_immutable: true
        late_initialize: {}
      LoggingConfiguration:
        late_initialize: {}
      EnvironmentClass:
        late_initialize: {}
      AirflowVersion:
        late_initialize: {}
      Schedulers:
        late_initialize: {}
      MinWorkers:
        late_initialize: {}
      MaxWorkers:
        late_initialize: {}
      MinWebservers:
        late_initialize: {}
      MaxWebservers:
        late_initialize: {}
      WeeklyMaintenanceWindowStart:
        late_initialize: {}
      WebserverAccessMode:
        late_initialize: {}
    hooks:
      sdk_read_one_post_set_output:
        template_path: hooks/environment/sdk_read_one_post_set_output.go.tpl
      sdk_update_pre_build_request:
        template_path: hooks/environment/sdk_update_pre_build_request.go.tpl
    synced:
      when:
        - path: Status.Status
          in:
            - AVAILABLE
    print:
      add_age_column: true
      add_synced_column: true
      order_by: index
      additional_columns:
        - name: STATUS
          json_path: .status.status
          type: string
          index: 10
        - name: AIRFLOWVERSION
          json_path: .spec.airflowVersion
          type: string
          index: 20
        - name: ENVIRONMENTCLASS
          json_path: .spec.environmentClass
          type: string
          index: 30
          priority: 1
